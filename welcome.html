<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Game-Zone</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="script.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body onload="check()">
    <header>
        <button class="menu" onclick="caside()">
            <i class="fas fa-bars" id="openmenu"></i>
            <i class="fas fa-xmark" id="closemenu"></i>
        </button>
        <div class="logo-box">
            <div><img src="logo.png" alt="Game-Zone" id="logo"></div>
            <div class="logo-text">GameZone</div>
        </div>
        <input type="search" placeholder="Search games and categories" id="search">
        <div><i class="fa fa-search" id="srch"></i></div>
        <div id="login">Log in</div>
    </header>
    <nav id="nav">
        <img src="logo.png" alt="Game-Zone" id="nlogo">
        <div id="n1">Welcome to GameZone!</div>
    </nav>
    <section class="games one">
        <h3>Featured Games</h3>
        <div class="game-card">
            <img src="ludo.png" alt="Game 1" class="sal" onclick="play('ludo')">
            <img src="snake and ladders.png" alt="Game 2" class="sal" onclick="play('sal')">
            <img src="tic tac toe.png" alt="Game 3" class="tictactoe" onclick="play('tictactoe')">
        </div>
    </section>
    <section class="games two">
        <h3>Pokemon Games</h3>
        <div class="game-card">
            <img src="Pokemon/start.jpg" alt="Game 3" class="pokemon" onclick="play('pokemon')">
            <img src="pokag.jpeg" alt="Game 3" class="pokemon" onclick="play('pag')">
        </div>
    </section>
    <aside id="aside" onmouseenter="aside()" onmouseleave="aside()">
        <i class="fa fa-home"></i>
        <div> Home</div><br>
        <i class="fa fa-history"></i>
        <div> Recently Played</div><br>
        <i class="fa fa-star"></i>
        <div> New Games</div><br>
        <i class="fa fa-fire"></i>
        <div> Popular</div><br>
        <i class="fa fa-heart"></i>
        <div> Liked Games</div><br>
        <i class="fa fa-users"></i>
        <div> Multiplayer</div>
        <hr>
        <i class="fa fa-bolt"></i>
        <div> Action</div><br>
        <i class="fa fa-compass"></i>
        <div> Adventure</div><br>
        <i class="fa fa-car"></i>
        <div> Racing</div><br>
        <i class="fa fa-motorcycle"></i>
        <div> Driving</div><br>
        <i class="fa fa-futbol"></i>
        <div> Sports</div><br>
        <i class="fa fa-chess"></i>
        <div> Strategy</div><br>
        <i class="fa fa-puzzle-piece"></i>
        <div> Puzzle</div><br>
        <i class="fa fa-dice"></i>
        <div> Board</div><br>
        <i class="fa fa-gamepad"></i>
        <div> Arcade</div><br>
        <i class="fa fa-ghost"></i>
        <div> Horror</div><br>
        <i class="fa fa-bomb"></i>
        <div> FIR</div><br>
        <i class="fa fa-mouse-pointer"></i>
        <div> Clicker</div><br>
        <i class="fa fa-robot"></i>
        <div> Simulation</div><br>
        <i class="fa fa-rocket"></i>
        <div> Space</div><br>
        <i class="fa fa-ship"></i>
        <div> Naval</div><br>
        <i class="fa fa-subway"></i>
        <div> Suburban</div><br>
        <i class="fa fa-tree"></i>
        <div> Nature</div><br>
        <i class="fa fa-plane"></i>
        <div> Airplane</div>
        <hr>
        <i class="fa fa-cog"></i>
        <div> Settings</div>
    </aside>
    
</html>
