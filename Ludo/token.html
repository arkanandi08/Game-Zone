<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ludo Pointer Tokens</title>

  <style>

    .token {
      width: 70px;
      cursor: pointer;
      transition: transform 0.2s ease;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,0.5));
    }

    .token:hover {
      transform: translateY(-6px) scale(1.1);
    }

    .token:active {
      transform: scale(0.95);
    }
  </style>
</head>

<body>

  <!-- 🔴 RED -->
  <svg class="token" viewBox="0 0 100 150">
    <defs>
      <radialGradient id="redGrad" cx="30%" cy="30%" r="70%">
        <stop offset="0%" stop-color="#ff6b6b"/>
        <stop offset="100%" stop-color="#b30000"/>
      </radialGradient>
    </defs>

    <ellipse cx="50" cy="105" rx="25" ry="25" fill="transparent" stroke="#fc0000" stroke-width="5"/>
    
    <path d="M50 10 
             C30 10, 15 25, 15 45 
             C15 70, 50 105, 50 105 
             C50 105, 85 70, 85 45 
             C85 25, 70 10, 50 10 Z"
          fill="url(#redGrad)" stroke="white" stroke-width="3"/>

    <circle cx="40" cy="35" r="10" fill="rgba(255,255,255,0.4)"/>
  </svg>


  <!-- 🟢 GREEN -->
  <svg class="token" viewBox="0 0 100 150">
    <defs>
      <radialGradient id="greenGrad" cx="30%" cy="30%" r="70%">
        <stop offset="0%" stop-color="#6bff95"/>
        <stop offset="100%" stop-color="#008a2e"/>
      </radialGradient>
    </defs>

    <ellipse cx="50" cy="105" rx="25" ry="25" fill="transparent" stroke="#01992a" stroke-width="5"/>
    
    <path d="M50 10 
             C30 10, 15 25, 15 45 
             C15 70, 50 105, 50 105 
             C50 105, 85 70, 85 45 
             C85 25, 70 10, 50 10 Z"
          fill="url(#greenGrad)" stroke="white" stroke-width="3"/>

    <circle cx="40" cy="35" r="10" fill="rgba(255,255,255,0.4)"/>
  </svg>


  <!-- 🔵 BLUE -->
  <svg class="token" viewBox="0 0 100 150">
    <defs>
      <radialGradient id="blueGrad" cx="30%" cy="30%" r="70%">
        <stop offset="0%" stop-color="#6bbcff"/>
        <stop offset="100%" stop-color="#003c99"/>
      </radialGradient>
    </defs>

    <ellipse cx="50" cy="105" rx="25" ry="25" fill="transparent" stroke="#00acff" stroke-width="5"/>
    
    <path d="M50 10 
             C30 10, 15 25, 15 45 
             C15 70, 50 105, 50 105 
             C50 105, 85 70, 85 45 
             C85 25, 70 10, 50 10 Z"
          fill="url(#blueGrad)" stroke="white" stroke-width="3"/>

    <circle cx="40" cy="35" r="10" fill="rgba(255,255,255,0.4)"/>
  </svg>


  <!-- 🟡 YELLOW -->
  <svg class="token" viewBox="0 0 100 150">
    <defs>
      <radialGradient id="yellowGrad" cx="30%" cy="30%" r="70%">
        <stop offset="0%" stop-color="#fff176"/>
        <stop offset="100%" stop-color="#c9a000"/>
      </radialGradient>
    </defs>

    <ellipse cx="50" cy="105" rx="25" ry="25" fill="transparent" stroke="#fee800" stroke-width="5"/>
    
    <path d="M50 10 
             C30 10, 15 25, 15 45 
             C15 70, 50 105, 50 105 
             C50 105, 85 70, 85 45
             C85 25, 70 10, 50 10 Z"
          fill="url(#yellowGrad)" stroke="white" stroke-width="3"/>

    <circle cx="40" cy="35" r="10" fill="rgba(255,255,255,0.4)"/>
  </svg>

</body>
</html>
